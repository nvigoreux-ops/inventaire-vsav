<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Ajout des scripts Firebase pour le direct -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <title>Inventaire Matériel - Caserne</title>
    <style>
        #summaryModal.active { display: flex; }
        .loading-overlay { display: flex; position: fixed; inset: 0; background: white; z-index: 100; align-items: center; justify-content: center; flex-direction: column; }
        /* Empêche la sélection de texte sur le bouton admin pour éviter les bugs visuels */
        #adminTrigger { -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
    </style>
</head>
<body class="bg-slate-100 pb-24 font-sans">

    <div id="loader" class="loading-overlay">
        <div class="animate-spin rounded-full h-12 w-12 border-4 border-red-600 border-t-transparent"></div>
        <p class="mt-4 text-slate-500 font-bold uppercase text-xs tracking-widest">Chargement du matériel...</p>
    </div>

    <div class="bg-red-700 text-white p-5 shadow-lg sticky top-0 z-50 flex flex-col items-center">
        <h1 id="adminTrigger" class="text-lg font-black uppercase tracking-tighter italic cursor-pointer">
            🚒 GESTION DES INVENTAIRES
        </h1>
        
        <select id="vehicleSelector" name="VÉHICULE" class="mt-3 w-full max-w-xs bg-red-800 border border-red-400 text-white text-sm rounded-lg p-2.5 outline-none focus:ring-2 focus:ring-white">
            <option value="VSAV">VSAV HAROUÉ</option>
            <option value="CTU">CTU HAROUÉ</option>
        </select>
    </div>

    <div class="max-w-md mx-auto px-4 mt-6">
        <form id="inventoryForm" action="https://formspree.io/f/xaqakwbn" method="POST">
            <input type="hidden" name="_replyto" value="nathan.vigoreux@sdis54.fr">
            
            <div id="accordionContainer" class="space-y-4"></div>

            <div class="mt-8 mb-6">
                <label class="block text-xs font-black text-slate-500 uppercase mb-2 ml-2">Observations / Matériel Manquant :</label>
                <!-- Ajout de l'événement oninput pour synchroniser le texte en direct -->
                <textarea id="globalComment" name="OBSERVATIONS" rows="3" oninput="updateObsFirebase(this)"
                    class="w-full rounded-2xl border-slate-200 border p-4 text-sm shadow-sm focus:ring-2 focus:ring-red-600 outline-none transition-all bg-white"
                    placeholder="RAS, matériel manquant, péremptions..."></textarea>
            </div>

            <div class="fixed bottom-0 left-0 right-0 p-4 bg-white/90 backdrop-blur-md border-t border-slate-200 text-center z-40">
                <button type="button" onclick="genererBilan()" class="w-full max-w-md mx-auto block bg-red-600 text-white font-black py-4 rounded-2xl shadow-xl active:scale-95 transition-transform uppercase">
                    Valider et Envoyer <span id="btnVehicleName">VSAV</span>
                </button>
            </div>
        </form>
    </div>

    <div id="summaryModal" class="hidden fixed inset-0 bg-slate-900/80 z-[60] flex-col items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm rounded-3xl overflow-hidden shadow-2xl flex flex-col max-h-[85vh]">
            <div class="bg-slate-800 text-white p-5 text-center">
                <h2 class="font-black uppercase italic text-red-500">Bilan des manquants</h2>
            </div>
            <div id="summaryContent" class="p-6 overflow-y-auto text-sm space-y-3 bg-slate-50"></div>
            <div class="p-4 border-t flex gap-3 bg-white">
                <button onclick="fermerBilan()" class="flex-1 bg-slate-200 text-slate-700 font-bold py-3 rounded-xl uppercase text-xs">Modifier</button>
                <button onclick="envoyerFormulaire()" class="flex-1 bg-red-600 text-white font-black py-3 rounded-xl uppercase text-xs shadow-lg shadow-red-200">Confirmer l'envoi</button>
            </div>
        </div>
    </div>

    <script>
        // CONFIGURATION FIREBASE (La magie du direct)
        const firebaseConfig = {
            databaseURL: "https://inventaire-b4ac2-default-rtdb.europe-west1.firebasedatabase.app/"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let currentDbRef = null;

        // CONFIGURATION GOOGLE SHEETS (La liste du matériel)
        const GOOGLE_SHEET_URL = "https://script.google.com/macros/s/AKfycbzwOVt0S1wuVtgDqBOe0aWfsn80dKsN2EwQsKh4XCGjX4lkada4TexHiP8PQuNOeg1YIA/exec";
        let toutesLesDonnees = {};

        async function chargerDonnees() {
            try {
                const response = await fetch(GOOGLE_SHEET_URL);
                const rawData = await response.json();
                const structure = {};
                rawData.forEach(item => {
                    if (!structure[item.Vehicule]) structure[item.Vehicule] = {};
                    if (!structure[item.Vehicule][item.Categorie]) structure[item.Vehicule][item.Categorie] = [];
                    structure[item.Vehicule][item.Categorie].push({
                        nom: item.Nom, max: item.Max, type: item.Type, couleur: item.Couleur
                    });
                });
                toutesLesDonnees = structure;
                document.getElementById('loader').style.display = 'none';
                renderInventory(document.getElementById('vehicleSelector').value);
            } catch (error) {
                alert("Erreur de chargement des données Google Sheets.");
                console.error(error);
            }
        }

        const container = document.getElementById('accordionContainer');
        const selector = document.getElementById('vehicleSelector');
        const btnVehicleName = document.getElementById('btnVehicleName');
        const modal = document.getElementById('summaryModal');

        // FONCTIONS DE MISE À JOUR FIREBASE
        function updateItemFirebase(element) {
            const vehicleKey = selector.value;
            const value = element.type === 'checkbox' ? element.checked : element.value;
            // On envoie la modification à Firebase
            db.ref('inventaire_en_cours/' + vehicleKey + '/' + element.name).set(value);
            // On met à jour le compteur du tiroir localement
            updateCategoryCount(element.closest('details'));
        }

        function updateObsFirebase(element) {
            const vehicleKey = selector.value;
            db.ref('inventaire_en_cours/' + vehicleKey + '/OBSERVATIONS').set(element.value);
        }

        function activerSynchro(vehicleKey) {
            // Si on écoutait un autre véhicule avant, on coupe la connexion
            if (currentDbRef) currentDbRef.off(); 
            
            // On se connecte au nouveau véhicule
            currentDbRef = db.ref('inventaire_en_cours/' + vehicleKey);
            
            // À chaque fois que quelqu'un d'autre modifie Firebase, on met à jour l'écran
            currentDbRef.on('value', (snapshot) => {
                const data = snapshot.val() || {};
                const inputs = document.querySelectorAll('input[data-item="true"]');
                
                inputs.forEach(input => {
                    const valFirebase = data[input.name];
                    if (input.type === 'checkbox') {
                        const isChecked = valFirebase === true;
                        if (input.checked !== isChecked) {
                            input.checked = isChecked;
                            updateCategoryCount(input.closest('details'));
                        }
                    } else if (input.type === 'number') {
                        const numVal = valFirebase !== undefined ? valFirebase : "";
                        // On ne modifie la case que si le pompier n'est pas déjà en train de taper dedans
                        if (input.value !== String(numVal) && document.activeElement !== input) {
                            input.value = numVal;
                            updateCategoryCount(input.closest('details'));
                        }
                    }
                });

                // Synchro du champ observations
                const obs = document.getElementById('globalComment');
                if (data['OBSERVATIONS'] !== undefined && obs.value !== data['OBSERVATIONS'] && document.activeElement !== obs) {
                    obs.value = data['OBSERVATIONS'];
                }
            });
        }

        function updateCategoryCount(detailsElement) {
            if (!detailsElement) return;
            const inputs = detailsElement.querySelectorAll('input[data-item="true"]');
            const badge = detailsElement.querySelector('.category-badge');
            let filled = 0;
            inputs.forEach(input => {
                if (input.type === 'checkbox' && input.checked) filled++;
                else if (input.type === 'number' && input.value > 0) filled++;
            });
            badge.innerText = `${filled} / ${inputs.length}`;
            badge.className = `category-badge px-2 py-0.5 rounded-full text-[10px] font-black ${filled === inputs.length ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-600'}`;
        }

        function renderInventory(vehicleKey) {
            container.innerHTML = ""; 
            btnVehicleName.innerText = vehicleKey;
            
            // On vide aussi le champ globalComment quand on change de véhicule
            document.getElementById('globalComment').value = "";
            
            const data = toutesLesDonnees[vehicleKey];
            if (!data) return;

            for (const [categorie, items] of Object.entries(data)) {
                const details = document.createElement('details');
                details.className = "group bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden open:shadow-lg transition-all";
                details.innerHTML = `
                    <summary class="list-none flex justify-between items-center p-5 cursor-pointer font-bold text-slate-800 uppercase text-sm tracking-wide">
                        <div class="flex items-center gap-3">
                            ${categorie}
                            <span class="category-badge bg-red-100 text-red-600 px-2 py-0.5 rounded-full text-[10px] font-black">0 / ${items.length}</span>
                        </div>
                        <span class="text-red-600 group-open:rotate-180 transition-transform">▼</span>
                    </summary>
                    <div class="border-t border-slate-100 bg-slate-50">
                        ${items.map(item => {
                            let textClass = "text-slate-600 font-bold";
                            const c = item.couleur ? item.couleur.toLowerCase() : "";
                            if (c === "rose") textClass = "text-pink-500 font-black";
                            else if (c === "bleu") textClass = "text-blue-600 font-black";
                            else if (c === "vert") textClass = "text-green-600 font-black";
                            else if (c === "rouge") textClass = "text-red-600 font-black";
                            else if (c === "noir") textClass = "text-slate-900 font-black";
                            const inputName = item.nom.replace(/[^a-zA-Z0-9]/g, '_');
                            return `
                            <div class="flex items-center justify-between p-4 border-b border-slate-100 last:border-0">
                                <span class="text-xs uppercase w-1/2 ${textClass}">${item.nom}</span>
                                ${item.type === "toggle" 
                                    ? `<label class="relative inline-flex items-center cursor-pointer">
                                        <input type="checkbox" name="${inputName}" data-item="true" data-label="${item.nom}" class="sr-only peer" onchange="updateItemFirebase(this)">
                                        <div class="w-11 h-6 bg-slate-200 rounded-full peer-checked:bg-green-500 transition-colors"></div>
                                        <div class="absolute left-1 top-1 bg-white w-4 h-4 rounded-full transition-transform peer-checked:translate-x-5"></div>
                                      </label>`
                                    : `<div class="flex items-center bg-white p-1 rounded-lg border border-slate-200">
                                        <input type="number" name="${inputName}" data-item="true" data-label="${item.nom}" data-max="${item.max}" inputmode="numeric" placeholder="0" 
                                            class="w-8 bg-transparent text-center font-bold text-red-600 outline-none" 
                                            oninput="updateItemFirebase(this)">
                                        <span class="text-slate-400 text-[10px] font-bold px-1">/ ${item.max}</span>
                                      </div>`
                                }
                            </div>`;
                        }).join('')}
                    </div>`;
                container.appendChild(details);
            }
            
            // On lance la synchronisation direct !
            activerSynchro(vehicleKey);
        }

        function genererBilan() {
            const inputs = document.querySelectorAll('input[data-item="true"]');
            let listeManquants = [];
            inputs.forEach(input => {
                if (input.type === 'checkbox' && !input.checked) {
                    listeManquants.push(`<div class="flex items-center gap-2 text-red-600 font-bold"><span class="w-2 h-2 bg-red-600 rounded-full"></span> ${input.dataset.label} (ABSENT)</div>`);
                } else if (input.type === 'number') {
                    const val = parseInt(input.value) || 0;
                    const max = parseInt(input.dataset.max);
                    if (val < max) {
                        listeManquants.push(`<div class="flex items-center gap-2 text-orange-600 font-bold"><span class="w-2 h-2 bg-orange-500 rounded-full"></span> ${input.dataset.label} (${val} / ${max})</div>`);
                    }
                }
            });
            document.getElementById('summaryContent').innerHTML = listeManquants.length === 0 ? `<div class="text-green-600 font-black text-center py-10">✅ INVENTAIRE COMPLET</div>` : listeManquants.join('');
            modal.classList.add('active');
        }

        function fermerBilan() { modal.classList.remove('active'); }
        
        function envoyerFormulaire() { 
            // On stoppe le direct pour que l'écran ne clignote pas
            if (currentDbRef) currentDbRef.off();
            
            // On efface les données de ce véhicule dans Firebase pour le prochain inventaire
            db.ref('inventaire_en_cours/' + selector.value).remove()
                .then(() => document.getElementById('inventoryForm').submit())
                .catch(() => document.getElementById('inventoryForm').submit());
        }

        // --- GESTION ADMIN : APPUI LONG 2 SECONDES ---
        let adminTimer;
        const trigger = document.getElementById('adminTrigger');

        function startTimer() {
            adminTimer = setTimeout(() => {
                const code = prompt("Code Administrateur :");
                if (code === "4572") {
                    window.open("https://docs.google.com/spreadsheets/d/1ugqT4Qjo2nfBgZF79cxsMT-bWzIYXirfMoAAzOsInYk/edit?gid=0#gid=0", "_blank");
                } else if (code !== null) {
                    alert("Code incorrect");
                }
            }, 2000);
        }

        function stopTimer() { clearTimeout(adminTimer); }

        trigger.addEventListener('touchstart', (e) => { startTimer(); });
        trigger.addEventListener('touchend', stopTimer);
        trigger.addEventListener('mousedown', startTimer);
        trigger.addEventListener('mouseup', stopTimer);
        trigger.addEventListener('contextmenu', e => e.preventDefault());

        selector.addEventListener('change', (e) => renderInventory(e.target.value));
        chargerDonnees();
    </script>
</body>
</html>
